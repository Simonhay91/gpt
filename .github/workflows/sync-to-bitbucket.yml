name: Sync to Bitbucket

on:
  push:
    branches:
      - main

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.BITBUCKET_SSH_KEY }}" | base64 --decode > ~/.ssh/bitbucket_key
          chmod 600 ~/.ssh/bitbucket_key
          ssh-keyscan -t rsa bitbucket.org >> ~/.ssh/known_hosts

      - name: Configure SSH
        run: |
          cat >> ~/.ssh/config << 'SSHEOF'
          Host bitbucket.org
            HostName bitbucket.org
            User git
            IdentityFile ~/.ssh/bitbucket_key
            StrictHostKeyChecking no
          SSHEOF

      - name: Push to Bitbucket
        run: |
          git remote add bitbucket git@bitbucket.org:planet-fiber/planet-knowledge.git
          git push bitbucket HEAD:master --force
