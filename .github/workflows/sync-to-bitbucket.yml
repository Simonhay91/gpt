name: Sync to Bitbucket

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.BITBUCKET_SSH_KEY }}" > ~/.ssh/bitbucket_key
          chmod 600 ~/.ssh/bitbucket_key
          ssh-keyscan bitbucket.org >> ~/.ssh/known_hosts

      - name: Push to Bitbucket
        run: |
          git config --global user.email "github-actions@github.com"
          git config --global user.name "GitHub Actions"
          git remote add bitbucket git@bitbucket.org:planet-fiber/planet-knowledge.git
          GIT_SSH_COMMAND="ssh -i ~/.ssh/bitbucket_key" git push bitbucket main:master --force
